<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator - Trae Tools</title>
    <meta name="description" content="Generate placeholder text (Lorem Ipsum) for your designs and mockups. Specify the number of paragraphs or sentences you need.">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="gradient-bg min-h-screen text-gray-100">
    <!-- Navigation -->
    <div id="main-nav"></div>

    <!-- Tool Content -->
    <main class="container mx-auto px-4 py-16">
        <h1 class="text-4xl font-bold mb-8 logo-3d">Lorem Ipsum Generator</h1>
        <div class="bg-white/10 p-8 rounded-xl">
            <div class="max-w-2xl mx-auto">
                <div class="flex items-center gap-4 mb-4">
                    <label for="paragraphs">Paragraphs:</label>
                    <input type="number" id="paragraphs" value="5" min="1" max="100" class="w-24 p-2 rounded bg-white/10">
                    <button id="generate-btn" class="px-4 py-2 rounded-full bg-blue-600 hover:bg-blue-700 transition-colors">Generate</button>
                </div>
                <textarea id="output" rows="15" class="w-full p-4 rounded bg-white/10" readonly></textarea>
            </div>
            <!-- Ad Space -->
            <div class="mt-8 bg-black/20 p-4 text-center">
                AD SPACE - In-Tool Ad
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="main-footer"></div>
    <script src="components.js"></script>
    <script>
        const paragraphsEl = document.getElementById('paragraphs');
        const generateBtn = document.getElementById('generate-btn');
        const outputEl = document.getElementById('output');

        const loremIpsum = [
            'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.',
            'Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.',
            'Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.',
            'Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.',
            'Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo.',
            'Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt.',
            'Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet, consectetur, adipisci velit, sed quia non numquam eius modi tempora incidunt ut labore et dolore magnam aliquam quaerat voluptatem.',
            'Ut enim ad minima veniam, quis nostrum exercitationem ullam corporis suscipit laboriosam, nisi ut aliquid ex ea commodi consequatur?',
            'Quis autem vel eum iure reprehenderit qui in ea voluptate velit esse quam nihil molestiae consequatur, vel illum qui dolorem eum fugiat quo voluptas nulla pariatur?',
            'At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis praesentium voluptatum deleniti atque corrupti quos dolores et quas molestias excepturi sint occaecati cupiditate non provident, similique sunt in culpa qui officia deserunt mollitia animi, id est laborum et dolorum fuga.'
        ];

        generateBtn.addEventListener('click', () => {
            const paragraphs = +paragraphsEl.value;
            let result = '';

            for (let i = 0; i < paragraphs; i++) {
                result += loremIpsum[Math.floor(Math.random() * loremIpsum.length)] + '\n\n';
            }

            outputEl.value = result.trim();
        });

        // Initial generation
        generateBtn.click();
    </script>
</body>
</html>
