<html lang="en">
<head>

    <title>Font Generator - Trae Tools</title>
    <meta name="description" content="Generate cool and stylish text fonts to copy and paste. Use our font generator for social media bios, captions, and more.">

        <div class="bg-white/10 p-8 rounded-xl">
            <div class="max-w-3xl mx-auto">
                <textarea id="text-input" rows="4" class="w-full p-4 rounded bg-white/10" placeholder="Enter your text here..."></textarea>
                <div id="font-outputs" class="mt-8 space-y-4"></div>
            </div>
            <!-- Ad Space -->
            <div class="mt-8 bg-black/20 p-4 text-center">
                AD SPACE - In-Tool Ad
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="main-footer"></div>

            'Bold': { 'a': '𝗮', 'b': '𝗯', 'c': '𝗰', 'd': '𝗱', 'e': '𝗲', 'f': '𝗳', 'g': '𝗴', 'h': '𝗵', 'i': '𝗶', 'j': '𝗷', 'k': '𝗸', 'l': '𝗹', 'm': '𝗺', 'n': '𝗻', 'o': '𝗼', 'p': '𝗽', 'q': '𝗾', 'r': '𝗿', 's': '𝘀', 't': '𝘁', 'u': '𝘂', 'v': '𝘃', 'w': '𝘄', 'x': '𝘅', 'y': '𝘆', 'z': '𝘇', 'A': '𝗔', 'B': '𝗕', 'C': '𝗖', 'D': '𝗗', 'E': '𝗘', 'F': '𝗙', 'G': '𝗚', 'H': '𝗛', 'I': '𝗜', 'J': '𝗝', 'K': '𝗞', 'L': '𝗟', 'M': '𝗠', 'N': '𝗡', 'O': '𝗢', 'P': '𝗣', 'Q': '𝗤', 'R': '𝗥', 'S': '𝗦', 'T': '𝗧', 'U': '𝗨', 'V': '𝗩', 'W': '𝗪', 'X': '𝗫', 'Y': '𝗬', 'Z': '𝗭' },
            'Italic': { 'a': '𝘢', 'b': '𝘣', 'c': '𝘤', 'd': '𝘥', 'e': '𝘦', 'f': '𝘧', 'g': '𝘨', 'h': '𝘩', 'i': '𝘪', 'j': '𝘫', 'k': '𝘬', 'l': '𝘭', 'm': '𝘮', 'n': '𝘯', 'o': '𝘰', 'p': '𝘱', 'q': '𝘲', 'r': '𝘳', 's': '𝘴', 't': '𝘵', 'u': '𝘶', 'v': '𝘷', 'w': '𝘸', 'x': '𝘹', 'y': '𝘺', 'z': '𝘻', 'A': '𝘈', 'B': '𝘉', 'C': '𝘊', 'D': '𝘋', 'E': '𝘌', 'F': '𝘍', 'G': '𝘎', 'H': '𝘏', 'I': '𝘐', 'J': '𝘑', 'K': '𝘒', 'L': '𝘓', 'M': '𝘔', 'N': '𝘕', 'O': '𝘖', 'P': '𝘗', 'Q': '𝘘', 'R': '𝘙', 'S': '𝘚', 'T': '𝘛', 'U': '𝘜', 'V': '𝘝', 'W': '𝘞', 'X': '𝘟', 'Y': '𝘠', 'Z': '𝘡' },
            'Monospace': { 'a': '𝚊', 'b': '𝚋', 'c': '𝚌', 'd': '𝚍', 'e': '𝚎', 'f': '𝚏', 'g': '𝚐', 'h': '𝚑', 'i': '𝚒', 'j': '𝚓', 'k': '𝚔', 'l': '𝚕', 'm': '𝚖', 'n': '𝚗', 'o': '𝚘', 'p': '𝚙', 'q': '𝚚', 'r': '𝚛', 's': '𝚜', 't': '𝚝', 'u': '𝚞', 'v': '𝚟', 'w': '𝚠', 'x': '𝚡', 'y': '𝚢', 'z': '𝚣', 'A': '𝙰', 'B': '𝙱', 'C': '𝙲', 'D': '𝙳', 'E': '𝙴', 'F': '𝙵', 'G': '𝙶', 'H': '𝙷', 'I': '𝙸', 'J': '𝙹', 'K': '𝙺', 'L': '𝙻', 'M': '𝙼', 'N': '𝙽', 'O': '𝙾', 'P': '𝙿', 'Q': '𝚀', 'R': '𝚁', 'S': '𝚂', 'T': '𝚃', 'U': '𝚄', 'V': '𝚅', 'W': '𝚆', 'X': '𝚇', 'Y': '𝚈', 'Z': '𝚉' },

        };

        function generateFonts() {
            const text = textInput.value;
            fontOutputs.innerHTML = '';

            if (!text) return;

            for (const [name, map] of Object.entries(fontMaps)) {
                let convertedText = '';
                if (name === 'Upside Down') {
                    for (let i = text.length - 1; i >= 0; i--) {
                        convertedText += map[text[i]] || text[i];
                    }
                } else {
                    for (const char of text) {
                        convertedText += map[char] || char;
                    }
                }

                const outputDiv = document.createElement('div');
                outputDiv.className = 'bg-black/20 p-4 rounded-lg flex justify-between items-center';
                outputDiv.innerHTML = `
                    <p class="text-lg">${convertedText}</p>
                    <button class="copy-btn px-4 py-2 rounded-full bg-blue-600 hover:bg-blue-700 transition-colors text-sm">Copy</button>
                `;
                fontOutputs.appendChild(outputDiv);

                outputDiv.querySelector('.copy-btn').addEventListener('click', () => {
                    navigator.clipboard.writeText(convertedText).then(() => {
                        alert(`Copied ${name} text!`);
                    });
                });
            }
        }

        textInput.addEventListener('input', generateFonts);
    </script>
