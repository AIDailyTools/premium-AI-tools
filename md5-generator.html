<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD5 Generator - Trae Tools</title>
    <meta name="description" content="Generate the MD5 hash of any text with our free online MD5 generator. A simple and fast tool for developers.">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="gradient-bg min-h-screen text-gray-100">
    <!-- Navigation -->
    <div id="main-nav"></div>

    <!-- Tool Content -->
    <main class="container mx-auto px-4 py-16">
        <h1 class="text-4xl font-bold mb-8 logo-3d">MD5 Generator</h1>
        <div class="bg-white/10 p-8 rounded-xl">
            <div class="max-w-2xl mx-auto">
                <textarea id="text-input" rows="8" class="w-full p-4 rounded bg-white/10" placeholder="Enter text to hash..."></textarea>
                <button id="generate-btn" class="w-full py-3 mt-4 rounded-full bg-blue-600 hover:bg-blue-700 transition-colors">Generate MD5 Hash</button>
                <div class="relative mt-4">
                    <input type="text" id="hash-output" readonly class="w-full py-3 px-4 rounded-full bg-white/10 border-2 border-transparent pr-16">
                    <button id="copy-btn" class="absolute right-2 top-1/2 -translate-y-1/2 px-4 py-2 rounded-full bg-blue-600 hover:bg-blue-700 transition-colors">Copy</button>
                </div>
            </div>
            <!-- Ad Space -->
            <div class="mt-8 bg-black/20 p-4 text-center">
                AD SPACE - In-Tool Ad
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="main-footer"></div>
    <script src="components.js"></script>
    <script>
        document.getElementById('generate-btn').addEventListener('click', () => {
            const textInput = document.getElementById('text-input').value;
            if (textInput) {
                const hash = CryptoJS.MD5(textInput).toString();
                document.getElementById('hash-output').value = hash;
            }
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            const hashOutput = document.getElementById('hash-output');
            if (hashOutput.value) {
                hashOutput.select();
                document.execCommand('copy');
                alert('Copied to clipboard!');
            }
        });
    </script>
</body>
</html>
